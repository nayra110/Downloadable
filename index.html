<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download Ikon Font Awesome - PNG & SVG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #eef2f8;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: linear-gradient(145deg, #4b1dd6, #7f3eff);
            border-radius: 32px;
            padding: 32px 36px;
            color: #fff;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 small {
            font-size: 14px;
            font-weight: 500;
            opacity: 0.8;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
        }

        .btn-white {
            background: #fff;
            color: #4b1dd6;
        }

        .btn-white:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .btn-outline-white {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-outline-white:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            transform: scale(1.05);
        }

        .btn-primary {
            background: #4b1dd6;
            color: #fff;
        }

        .btn-primary:hover {
            background: #7f3eff;
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(75, 29, 214, 0.3);
        }

        .btn-success {
            background: #2ecc71;
            color: #fff;
        }

        .btn-success:hover {
            background: #27ae60;
            transform: scale(1.05);
        }

        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }

        .btn-danger:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        .btn-warning {
            background: #f39c12;
            color: #fff;
        }

        .btn-warning:hover {
            background: #e67e22;
            transform: scale(1.05);
        }

        /* Controls */
        .controls {
            background: #fff;
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }

        .controls .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .controls .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 2px solid #e8ecf2;
            border-radius: 40px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: #f8fcff;
        }

        .controls .search-box input:focus {
            outline: none;
            border-color: #4b1dd6;
            box-shadow: 0 0 0 4px rgba(75, 29, 214, 0.08);
        }

        .controls .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8d9bb0;
        }

        .controls .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .controls .filter-group .filter-btn {
            padding: 6px 16px;
            border: 2px solid #e8ecf2;
            border-radius: 40px;
            background: transparent;
            font-size: 12px;
            font-weight: 600;
            color: #6b7b93;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .controls .filter-group .filter-btn:hover {
            border-color: #4b1dd6;
            color: #4b1dd6;
        }

        .controls .filter-group .filter-btn.active {
            background: #4b1dd6;
            color: #fff;
            border-color: #4b1dd6;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #fff;
            border-radius: 20px;
            padding: 16px 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .stat-card .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #fff;
        }

        .stat-card .stat-icon.purple {
            background: #4b1dd6;
        }
        .stat-card .stat-icon.green {
            background: #2ecc71;
        }
        .stat-card .stat-icon.blue {
            background: #3498db;
        }
        .stat-card .stat-icon.orange {
            background: #f39c12;
        }

        .stat-card .stat-info .number {
            font-size: 22px;
            font-weight: 700;
            color: #1a2538;
            line-height: 1.2;
        }

        .stat-card .stat-info .label {
            font-size: 12px;
            color: #8d9bb0;
            font-weight: 500;
        }

        /* Icon Grid */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .icon-card {
            background: #fff;
            border-radius: 20px;
            padding: 16px 12px 14px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .icon-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(75, 29, 214, 0.08);
            border-color: rgba(75, 29, 214, 0.1);
        }

        .icon-card.selected {
            border-color: #4b1dd6;
            background: rgba(75, 29, 214, 0.03);
        }

        .icon-card .icon-preview {
            font-size: 32px;
            color: #1a2538;
            display: block;
            margin-bottom: 8px;
            transition: transform 0.3s ease;
        }

        .icon-card:hover .icon-preview {
            transform: scale(1.15);
        }

        .icon-card .icon-name {
            font-size: 10px;
            color: #8d9bb0;
            font-weight: 500;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .icon-card .download-options {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 0 0 20px 20px;
            padding: 8px 10px;
            gap: 6px;
            justify-content: center;
        }

        .icon-card:hover .download-options {
            display: flex;
        }

        .icon-card .download-options .dl-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 12px;
            font-size: 9px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .icon-card .download-options .dl-btn.png {
            background: #3498db;
            color: #fff;
        }

        .icon-card .download-options .dl-btn.png:hover {
            background: #2980b9;
            transform: scale(1.05);
        }

        .icon-card .download-options .dl-btn.svg {
            background: #2ecc71;
            color: #fff;
        }

        .icon-card .download-options .dl-btn.svg:hover {
            background: #27ae60;
            transform: scale(1.05);
        }

        .icon-card .check-mark {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4b1dd6;
            color: #fff;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .icon-card.selected .check-mark {
            opacity: 1;
        }

        /* Selected Actions */
        .selected-actions {
            background: #fff;
            border-radius: 24px;
            padding: 16px 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            display: none;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .selected-actions.show {
            display: flex;
        }

        .selected-actions .info {
            flex: 1;
            font-size: 14px;
            color: #3d4a5e;
        }

        .selected-actions .info strong {
            color: #4b1dd6;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #8d9bb0;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e8ecf2;
            border-top-color: #4b1dd6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 14px 28px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
                padding: 24px 20px;
            }

            .header h1 {
                font-size: 22px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .controls .filter-group {
                justify-content: center;
            }

            .icon-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 12px;
            }

            .icon-card .icon-preview {
                font-size: 26px;
            }
        }

        @media (max-width: 480px) {
            .icon-grid {
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
                gap: 8px;
            }

            .icon-card {
                padding: 12px 8px 10px;
            }

            .icon-card .icon-preview {
                font-size: 22px;
            }

            .icon-card .icon-name {
                font-size: 8px;
            }

            .stats {
                grid-template-columns: 1fr 1fr;
            }

            .stat-card {
                padding: 12px 14px;
            }

            .stat-card .stat-info .number {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <i class="fas fa-icons"></i>
                Download Ikon
                <small>Font Awesome 6.7.2</small>
            </h1>
            <div class="header-actions">
                <button class="btn btn-outline-white" onclick="selectAll()">
                    <i class="fas fa-check-double"></i> Pilih Semua
                </button>
                <button class="btn btn-outline-white" onclick="clearSelection()">
                    <i class="fas fa-times"></i> Hapus Pilihan
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-icon purple"><i class="fas fa-icons"></i></div>
                <div class="stat-info">
                    <div class="number" id="totalIcons">0</div>
                    <div class="label">Total Ikon</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                <div class="stat-info">
                    <div class="number" id="selectedCount">0</div>
                    <div class="label">Dipilih</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-download"></i></div>
                <div class="stat-info">
                    <div class="number" id="downloadCount">0</div>
                    <div class="label">Total Download</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange"><i class="fas fa-clock"></i></div>
                <div class="stat-info">
                    <div class="number" id="lastDownload">-</div>
                    <div class="label">Terakhir Download</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari ikon..." oninput="filterIcons()" />
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Semua</button>
                <button class="filter-btn" data-filter="fas" onclick="setFilter('fas')">Solid</button>
                <button class="filter-btn" data-filter="far" onclick="setFilter('far')">Regular</button>
                <button class="filter-btn" data-filter="fab" onclick="setFilter('fab')">Brand</button>
                <button class="filter-btn" data-filter="selected" onclick="setFilter('selected')">Terpilih</button>
            </div>
        </div>

        <!-- Selected Actions -->
        <div class="selected-actions" id="selectedActions">
            <div class="info">
                <strong id="selectedInfo">0</strong> ikon dipilih
            </div>
            <button class="btn btn-primary" onclick="downloadSelectedPNG()">
                <i class="fas fa-file-image"></i> Download PNG
            </button>
            <button class="btn btn-success" onclick="downloadSelectedSVG()">
                <i class="fas fa-code"></i> Download SVG
            </button>
            <button class="btn btn-warning" onclick="downloadSelectedZIP()">
                <i class="fas fa-file-archive"></i> ZIP (PNG+SVG)
            </button>
        </div>

        <!-- Icon Grid -->
        <div id="iconGrid" class="icon-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Memuat ikon...</p>
            </div>
        </div>

        <!-- Footer Actions -->
        <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center; padding:20px 0;">
            <button class="btn btn-primary" onclick="downloadAllPNG()">
                <i class="fas fa-file-image"></i> Download Semua PNG
            </button>
            <button class="btn btn-success" onclick="downloadAllSVG()">
                <i class="fas fa-code"></i> Download Semua SVG
            </button>
            <button class="btn btn-warning" onclick="downloadAllZIP()">
                <i class="fas fa-file-archive"></i> Download Semua (ZIP)
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ================================================================
        // DATA IKON
        // ================================================================
        const iconData = [
            // Solid (fas)
            'fa-user', 'fa-graduation-cap', 'fa-calendar-alt', 'fa-clock',
            'fa-message', 'fa-chart-pie', 'fa-arrow-up', 'fa-arrow-down',
            'fa-circle-check', 'fa-grid-2', 'fa-atom', 'fa-arrow-right-arrow-left',
            'fa-bolt', 'fa-rocket', 'fa-magnet', 'fa-square-root-variable',
            'fa-vr-cardboard', 'fa-cubes', 'fa-circle-play', 'fa-eye',
            'fa-pencil', 'fa-book-open', 'fa-house', 'fa-user',
            'fa-xmark', 'fa-bell', 'fa-check-circle', 'fa-play-circle',
            'fa-file-alt', 'fa-star', 'fa-floppy-disk', 'fa-play',
            'fa-stop', 'fa-download', 'fa-copy', 'fa-list', 'fa-file-code',
            'fa-cloud-upload-alt', 'fa-save', 'fa-pen',
            // Tambahan solid
            'fa-home', 'fa-search', 'fa-heart', 'fa-star', 'fa-user-circle',
            'fa-cog', 'fa-wrench', 'fa-tools', 'fa-camera', 'fa-video',
            'fa-music', 'fa-headphones', 'fa-microphone', 'fa-volume-up',
            'fa-phone', 'fa-envelope', 'fa-map-marker-alt', 'fa-globe',
            'fa-lock', 'fa-unlock', 'fa-key', 'fa-shield-alt',
            'fa-trash', 'fa-edit', 'fa-plus', 'fa-minus', 'fa-times',
            'fa-check', 'fa-question-circle', 'fa-exclamation-circle',
            'fa-info-circle', 'fa-warning', 'fa-fire', 'fa-bolt',
            'fa-cloud', 'fa-rain', 'fa-snowflake', 'fa-sun', 'fa-moon',
            'fa-tree', 'fa-leaf', 'fa-flower', 'fa-mountain',
            'fa-car', 'fa-bus', 'fa-train', 'fa-ship', 'fa-plane',
            'fa-bicycle', 'fa-walking', 'fa-running', 'fa-swimmer',
            'fa-coffee', 'fa-utensils', 'fa-pizza-slice', 'fa-ice-cream',
            'fa-mug-saucer', 'fa-mug-hot', 'fa-wine-glass', 'fa-beer',
            'fa-tv', 'fa-laptop', 'fa-tablet', 'fa-mobile', 'fa-desktop',
            'fa-print', 'fa-fax', 'fa-copy', 'fa-clipboard',
            'fa-paste', 'fa-eraser', 'fa-paintbrush', 'fa-palette',
            'fa-fill-drip', 'fa-brush', 'fa-pen-fancy', 'fa-pen-nib',
            // Regular (far)
            'fa-calendar', 'fa-clock', 'fa-star', 'fa-heart', 'fa-user',
            'fa-envelope', 'fa-file', 'fa-folder', 'fa-folder-open',
            'fa-address-book', 'fa-address-card', 'fa-bell', 'fa-bookmark',
            'fa-building', 'fa-calendar-check', 'fa-calendar-plus',
            'fa-caret-square-down', 'fa-caret-square-left', 'fa-caret-square-right',
            'fa-caret-square-up', 'fa-circle', 'fa-clipboard',
            'fa-clock', 'fa-comment', 'fa-comment-dots', 'fa-comments',
            'fa-compass', 'fa-copy', 'fa-copyright', 'fa-credit-card',
            'fa-dizzy', 'fa-dot-circle', 'fa-edit', 'fa-eye-slash',
            'fa-file-archive', 'fa-file-audio', 'fa-file-code',
            'fa-file-excel', 'fa-file-image', 'fa-file-pdf',
            'fa-file-powerpoint', 'fa-file-video', 'fa-file-word',
            'fa-flag', 'fa-flushed', 'fa-frown', 'fa-futbol',
            'fa-gem', 'fa-grimace', 'fa-grin', 'fa-grin-hearts',
            'fa-grin-squint', 'fa-grin-stars', 'fa-grin-tears',
            'fa-grin-tongue', 'fa-grin-wink', 'fa-hand-lizard',
            'fa-hand-paper', 'fa-hand-peace', 'fa-hand-point-down',
            'fa-hand-point-left', 'fa-hand-point-right', 'fa-hand-point-up',
            'fa-hand-pointer', 'fa-hand-scissors', 'fa-hand-spock',
            'fa-handshake', 'fa-hdd', 'fa-hospital', 'fa-hourglass',
            'fa-id-card', 'fa-images', 'fa-keyboard', 'fa-kiss',
            'fa-kiss-beam', 'fa-kiss-wink-heart', 'fa-laugh',
            'fa-laugh-beam', 'fa-laugh-squint', 'fa-laugh-wink',
            'fa-lemon', 'fa-life-ring', 'fa-lightbulb', 'fa-map',
            'fa-meh', 'fa-meh-blank', 'fa-meh-rolling-eyes',
            'fa-minus-square', 'fa-moon', 'fa-newspaper',
            'fa-object-group', 'fa-object-ungroup', 'fa-paper-plane',
            'fa-pause-circle', 'fa-play-circle', 'fa-plus-square',
            'fa-question-circle', 'fa-registered', 'fa-sad-cry',
            'fa-sad-tear', 'fa-save', 'fa-share-square',
            'fa-smile', 'fa-smile-beam', 'fa-smile-wink', 'fa-snowflake',
            'fa-square', 'fa-star', 'fa-star-half', 'fa-sticky-note',
            'fa-stop-circle', 'fa-sun', 'fa-surprise', 'fa-thumbs-down',
            'fa-thumbs-up', 'fa-times-circle', 'fa-tired',
            'fa-trash-alt', 'fa-user', 'fa-user-circle',
            'fa-window-close', 'fa-window-maximize', 'fa-window-minimize',
            'fa-window-restore',
            // Brands (fab)
            'fa-github', 'fa-twitter', 'fa-facebook', 'fa-instagram',
            'fa-youtube', 'fa-linkedin', 'fa-whatsapp', 'fa-telegram',
            'fa-discord', 'fa-slack', 'fa-docker', 'fa-aws',
            'fa-google', 'fa-apple', 'fa-windows', 'fa-linux',
            'fa-android', 'fa-react', 'fa-vuejs', 'fa-angular',
            'fa-bootstrap', 'fa-tailwindcss', 'fa-sass', 'fa-less',
            'fa-node', 'fa-python', 'fa-java', 'fa-php',
            'fa-ruby', 'fa-swift', 'fa-kotlin', 'fa-go',
            'fa-rust', 'fa-trello', 'fa-jira', 'fa-git',
            'fa-git-alt', 'fa-github-alt', 'fa-gitlab', 'fa-bitbucket',
            'fa-stack-overflow', 'fa-stack-exchange', 'fa-hacker-news',
            'fa-codepen', 'fa-css3', 'fa-html5', 'fa-js',
            'fa-php', 'fa-python', 'fa-docker'
        ];

        // ================================================================
        // STATE
        // ================================================================
        let allIcons = [];
        let selectedIcons = new Set();
        let currentFilter = 'all';
        let downloadCount = 0;
        let lastDownloadTime = null;

        // ================================================================
        // FUNGSI UTAMA
        // ================================================================

        function initIcons() {
            const grid = document.getElementById('iconGrid');
            grid.innerHTML = '';

            // Map icon data dengan prefix
            allIcons = iconData.map(name => {
                let prefix = 'fas';
                if (name.startsWith('fa-') && !name.startsWith('fa-')) {
                    // sudah ada prefix
                    const parts = name.split(' ');
                    if (parts.length > 1) {
                        prefix = parts[0];
                        name = parts[1];
                    }
                }
                // Tentukan prefix berdasarkan data

        function renderIcons() {
            const grid = document.getElementById('iconGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allIcons;

            // Filter by search
            if (search) {
                filtered = filtered.filter(icon =>
                    icon.name.toLowerCase().includes(search) ||
                    icon.display.toLowerCase().includes(search)
                );
            }

            // Filter by type
            if (currentFilter === 'fas') {
                filtered = filtered.filter(icon => icon.prefix === 'fas');
            } else if (currentFilter === 'far') {
                filtered = filtered.filter(icon => icon.prefix === 'far');
            } else if (currentFilter === 'fab') {
                filtered = filtered.filter(icon => icon.prefix === 'fab');
            } else if (currentFilter === 'selected') {
                filtered = filtered.filter(icon => selectedIcons.has(icon.name));
            }

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:#8d9bb0;">
                        <i class="fas fa-search" style="font-size:40px; display:block; margin-bottom:12px; opacity:0.3;"></i>
                        <p style="font-size:16px; font-weight:500;">Tidak ada ikon yang ditemukan</p>
                        <p style="font-size:13px;">Coba kata kunci lain atau reset filter</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map(icon => `
                <div class="icon-card ${selectedIcons.has(icon.name) ? 'selected' : ''}" 
                     onclick="toggleIcon('${icon.name}')"
                     data-name="${icon.name}"
                     data-prefix="${icon.prefix}">
                    <div class="check-mark"><i class="fas fa-check"></i></div>
                    <i class="${icon.prefix} ${icon.name} icon-preview"></i>
                    <div class="icon-name">${icon.display}</div>
                    <div class="download-options">
                        <button class="dl-btn png" onclick="event.stopPropagation(); downloadIcon('${icon.name}', 'png')">
                            <i class="fas fa-image"></i> PNG
                        </button>
                        <button class="dl-btn svg" onclick="event.stopPropagation(); downloadIcon('${icon.name}', 'svg')">
                            <i class="fas fa-code"></i> SVG
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('totalIcons').textContent = allIcons.length;
            document.getElementById('selectedCount').textContent = selectedIcons.size;

            const actions = document.getElementById('selectedActions');
            if (selectedIcons.size > 0) {
                actions.classList.add('show');
                document.getElementById('selectedInfo').textContent = selectedIcons.size;
            } else {
                actions.classList.remove('show');
            }
        }

        // ================================================================
        // FUNGSI FILTER & SEARCH
        // ================================================================

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            renderIcons();
        }

        function filterIcons() {
            renderIcons();
        }

        // ================================================================
        // FUNGSI SELECTION
        // ================================================================

        function toggleIcon(name) {
            if (selectedIcons.has(name)) {
                selectedIcons.delete(name);
            } else {
                selectedIcons.add(name);
            }
            renderIcons();
            updateStats();
        }

        function selectAll() {
            allIcons.forEach(icon => selectedIcons.add(icon.name));
            renderIcons();
            updateStats();
            showToast(`✅ ${selectedIcons.size} ikon dipilih`);
        }

        function clearSelection() {
            selectedIcons.clear();
            renderIcons();
            updateStats();
            showToast('🗑️ Pilihan dihapus');
        }

        // ================================================================
        // FUNGSI DOWNLOAD IKON (PNG / SVG)
        // ================================================================

        function downloadIcon(name, format) {
            const icon = allIcons.find(i => i.name === name);
            if (!icon) return;

            const prefix = icon.prefix;
            const fullName = `${prefix} ${name}`;

            // Buat elemen untuk render
            const canvas = document.createElement('canvas');
            const size = 128;
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Background transparan
            ctx.clearRect(0, 0, size, size);

            // Render icon ke canvas menggunakan SVG
            const svgString = `
                <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
                    <style>
                        .fa { font-family: 'Font Awesome 6 Free'; font-weight: 900; }
                        .fab { font-family: 'Font Awesome 6 Brands'; font-weight: 400; }
                        .far { font-family: 'Font Awesome 6 Free'; font-weight: 400; }
                        .fas { font-family: 'Font Awesome 6 Free'; font-weight: 900; }
                    </style>
                    <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle" 
                          font-size="72" fill="#1a2538" class="${prefix}">${name.replace('fa-', '')}</text>
                </svg>
            `;

            // Untuk SVG, download langsung
            if (format === 'svg') {
                const svgBlob = new Blob([svgString], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(svgBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${name}.svg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                updateDownloadStats();
                showToast(`✅ ${name}.svg berhasil diunduh`);
                return;
            }

            // Untuk PNG, render ke canvas
            const img = new Image();
            const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);

            img.onload = function() {
                ctx.drawImage(img, 0, 0, size, size);
                const pngUrl = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = pngUrl;
                a.download = `${name}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                updateDownloadStats();
                showToast(`✅ ${name}.png berhasil diunduh`);
            };

            img.onerror = function() {
                // Fallback: render teks sederhana
                ctx.fillStyle = '#1a2538';
                ctx.font = '48px "Font Awesome 6 Free"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const displayName = name.replace('fa-', '');
                ctx.fillText(displayName, size / 2, size / 2);

                const pngUrl = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = pngUrl;
                a.download = `${name}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                updateDownloadStats();
                showToast(`✅ ${name}.png berhasil diunduh (fallback)`);
            };

            img.src = url;
        }
